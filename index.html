<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagos semana</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      padding: 2rem 1.25rem;
    }
    .app { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; }
    .subtitle { font-size: 14px; color: #888; margin-top: 4px; margin-bottom: 1.75rem; }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.75rem;
    }
    .metric {
      background: #f0f0ef;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .metric-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .metric-value { font-size: 26px; font-weight: 600; }
    .metric-value.green { color: #1D9E75; }
    .metric-value.neutral { color: #111; }
    .metric-value.amber { color: #BA7517; }
    .week-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
    .week-card {
      background: #fff;
      border: 1px solid #ebebeb;
      border-radius: 12px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      user-select: none;
      transition: box-shadow 0.15s;
    }
    .week-card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .week-card.paid   { border-left: 3px solid #1D9E75; }
    .week-card.overdue { border-left: 3px solid #D85A30; }
    .week-card.pending { border-left: 3px solid #e0e0e0; }
    .check {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .check.checked { background: #1D9E75; border-color: #1D9E75; }
    .check svg { display: none; }
    .check.checked svg { display: block; }
    .week-info { flex: 1; }
    .week-label { font-size: 14px; font-weight: 500; }
    .week-dates { font-size: 12px; color: #aaa; margin-top: 2px; }
    .badge {
      font-size: 11px; font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .badge.paid    { background: #E1F5EE; color: #0F6E56; }
    .badge.overdue { background: #FAECE7; color: #993C1D; }
    .badge.pending { background: #f0f0f0; color: #888; }
    .add-btn {
      width: 100%;
      padding: 11px;
      border: 1px dashed #ccc;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
      color: #aaa;
      font-size: 13px;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .add-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
<div class="app">
  <h1>Pagos semana</h1>
  <p class="subtitle">Marca las semanas en que recibiste pago</p>
  <div class="summary" id="summary"></div>
  <div class="week-list" id="week-list"></div>
  <button class="add-btn" onclick="addWeek()">+ Agregar semana</button>
</div>

<script>
  const today = new Date();

  function getMondayOf(d) {
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const m = new Date(d);
    m.setDate(diff);
    return m;
  }

  function fmtDate(d) {
    return d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short' });
  }

  function getWeekRange(offset) {
    const mon = getMondayOf(today);
    mon.setDate(mon.getDate() + offset * 7);
    const sun = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    return { start: new Date(mon), end: new Date(sun) };
  }

  let weeks = Array.from({ length: 4 }, (_, i) => {
    const offset = i - 3;
    const { start, end } = getWeekRange(offset);
    return {
      id: i,
      label: 'Semana del ' + fmtDate(start),
      dateRange: fmtDate(start) + ' – ' + fmtDate(end),
      paid: false,
      isOverdue: offset < 0
    };
  });

  function renderSummary() {
    const paid = weeks.filter(w => w.paid).length;
    const pending = weeks.filter(w => !w.paid && !w.isOverdue).length;
    const overdue = weeks.filter(w => !w.paid && w.isOverdue).length;
    document.getElementById('summary').innerHTML =
      metric('Recibidos', paid, 'green') +
      metric('Pendientes', pending, 'neutral') +
      metric('Atrasados', overdue, 'amber');
  }

  function metric(label, value, cls) {
    return '<div class="metric"><div class="metric-label">' + label + '</div><div class="metric-value ' + cls + '">' + value + '</div></div>';
  }

  function renderWeeks() {
    document.getElementById('week-list').innerHTML = weeks.map(w => {
      const state = w.paid ? 'paid' : (w.isOverdue ? 'overdue' : 'pending');
      const badgeText = w.paid ? 'Recibido' : (w.isOverdue ? 'Atrasado' : 'Pendiente');
      return '<div class="week-card ' + state + '" onclick="toggle(' + w.id + ')">' +
        '<div class="check ' + (w.paid ? 'checked' : '') + '">' +
          '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2.5 6.5L5.5 9.5L10.5 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</div>' +
        '<div class="week-info">' +
          '<div class="week-label">' + w.label + '</div>' +
          '<div class="week-dates">' + w.dateRange + '</div>' +
        '</div>' +
        '<span class="badge ' + state + '">' + badgeText + '</span>' +
      '</div>';
    }).join('');
  }

  function toggle(id) {
    const w = weeks.find(x => x.id === id);
    if (w) w.paid = !w.paid;
    render();
  }

  function addWeek() {
    const offset = weeks.length - 3;
    const { start, end } = getWeekRange(offset);
    weeks.push({
      id: weeks.length,
      label: 'Semana del ' + fmtDate(start),
      dateRange: fmtDate(start) + ' – ' + fmtDate(end),
      paid: false,
      isOverdue: false
    });
    render();
  }

  function render() {
    renderSummary();
    renderWeeks();
  }

  render();
</script>
</body>
</html>
