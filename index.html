<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagos semana</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      padding: 2rem 1.25rem;
    }
    .app { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; }
    .subtitle { font-size: 14px; color: #888; margin-top: 4px; margin-bottom: 1.75rem; }

    /* Summary */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.75rem;
    }
    .metric { background: #f0f0ef; border-radius: 10px; padding: 12px 14px; }
    .metric-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .metric-value { font-size: 26px; font-weight: 600; }
    .metric-value.green  { color: #1D9E75; }
    .metric-value.neutral { color: #111; }
    .metric-value.amber  { color: #BA7517; }

    /* Week cards */
    .week-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
    .week-card {
      background: #fff;
      border: 1px solid #ebebeb;
      border-radius: 12px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: box-shadow 0.15s;
    }
    .week-card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .week-card.paid    { border-left: 3px solid #1D9E75; }
    .week-card.overdue { border-left: 3px solid #D85A30; }
    .week-card.pending { border-left: 3px solid #e0e0e0; }

    .check {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1.5px solid #ccc;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer;
      transition: all 0.15s;
    }
    .check.checked { background: #1D9E75; border-color: #1D9E75; }
    .check svg { display: none; }
    .check.checked svg { display: block; }

    .week-info { flex: 1; cursor: pointer; }
    .week-label { font-size: 14px; font-weight: 500; }
    .week-dates { font-size: 12px; color: #aaa; margin-top: 2px; }

    .badge {
      font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 20px; flex-shrink: 0;
    }
    .badge.paid    { background: #E1F5EE; color: #0F6E56; }
    .badge.overdue { background: #FAECE7; color: #993C1D; }
    .badge.pending { background: #f0f0f0; color: #888; }

    .delete-btn {
      width: 28px; height: 28px;
      border-radius: 8px; border: none;
      background: transparent;
      cursor: pointer;
      color: #ccc;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .delete-btn:hover { background: #FAECE7; color: #D85A30; }

    /* Add button */
    .add-btn {
      width: 100%; padding: 11px;
      border: 1px dashed #ccc; border-radius: 10px;
      background: transparent; cursor: pointer;
      color: #aaa; font-size: 13px; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s;
      margin-bottom: 2rem;
    }
    .add-btn:hover { background: #f5f5f5; }

    /* History */
    .section-title {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: #bbb; margin-bottom: 10px;
    }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid #ebebeb;
      border-radius: 10px;
      font-size: 13px;
    }
    .history-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .history-dot.paid    { background: #1D9E75; }
    .history-dot.deleted { background: #ccc; }
    .history-label { flex: 1; color: #555; }
    .history-status { font-size: 11px; font-weight: 500; color: #aaa; }
    .history-status.paid { color: #1D9E75; }
    .history-date-label { font-size: 11px; color: #ccc; }
    .empty-history { font-size: 13px; color: #ccc; padding: 10px 0; }

    .clear-history-btn {
      margin-top: 10px;
      font-size: 12px; color: #ccc;
      background: none; border: none;
      cursor: pointer; font-family: inherit;
      padding: 4px 0;
      transition: color 0.15s;
    }
    .clear-history-btn:hover { color: #D85A30; }

    hr { border: none; border-top: 1px solid #efefef; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
<div class="app">
  <h1>Pagos semana</h1>
  <p class="subtitle">Marca las semanas en que recibiste pago</p>

  <div class="summary" id="summary"></div>
  <div class="week-list" id="week-list"></div>
  <button class="add-btn" onclick="addWeek()">+ Agregar semana</button>

  <hr />
  <div class="section-title">Historial</div>
  <div class="history-list" id="history-list"></div>
  <button class="clear-history-btn" onclick="clearHistory()">Limpiar historial</button>
</div>

<script>
  const STORAGE_KEY   = 'pagos_weeks';
  const HISTORY_KEY   = 'pagos_history';

  const today = new Date();

  function getMondayOf(d) {
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const m = new Date(d); m.setDate(diff); return m;
  }
  function fmtDate(d) {
    return d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short' });
  }
  function fmtDateTime(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' });
  }
  function getWeekRange(offset) {
    const mon = getMondayOf(today);
    mon.setDate(mon.getDate() + offset * 7);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    return { start: new Date(mon), end: new Date(sun) };
  }

  // --- State ---
  function loadWeeks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    // Default: last 3 weeks + current
    return Array.from({ length: 4 }, (_, i) => {
      const offset = i - 3;
      const { start, end } = getWeekRange(offset);
      return {
        id: Date.now() + i,
        label: 'Semana del ' + fmtDate(start),
        dateRange: fmtDate(start) + ' – ' + fmtDate(end),
        paid: false,
        isOverdue: offset < 0
      };
    });
  }
  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return [];
  }

  let weeks   = loadWeeks();
  let history = loadHistory();

  function saveWeeks()   { localStorage.setItem(STORAGE_KEY, JSON.stringify(weeks)); }
  function saveHistory() { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

  function addHistoryEntry(label, dateRange, type) {
    history.unshift({ label, dateRange, type, at: new Date().toISOString() });
    if (history.length > 100) history = history.slice(0, 100);
    saveHistory();
  }

  // --- Actions ---
  function toggle(id) {
    const w = weeks.find(x => x.id === id);
    if (!w) return;
    w.paid = !w.paid;
    if (w.paid) addHistoryEntry(w.label, w.dateRange, 'paid');
    saveWeeks();
    render();
  }

  function deleteWeek(id) {
    const w = weeks.find(x => x.id === id);
    if (!w) return;
    addHistoryEntry(w.label, w.dateRange, w.paid ? 'paid' : 'deleted');
    weeks = weeks.filter(x => x.id !== id);
    saveWeeks();
    render();
  }

  function addWeek() {
    // Find next offset based on latest week
    const offset = weeks.length - 3;
    const { start, end } = getWeekRange(offset);
    weeks.push({
      id: Date.now(),
      label: 'Semana del ' + fmtDate(start),
      dateRange: fmtDate(start) + ' – ' + fmtDate(end),
      paid: false,
      isOverdue: false
    });
    saveWeeks();
    render();
  }

  function clearHistory() {
    if (!confirm('¿Limpiar todo el historial?')) return;
    history = [];
    saveHistory();
    renderHistory();
  }

  // --- Render ---
  function renderSummary() {
    const paid    = weeks.filter(w => w.paid).length;
    const pending = weeks.filter(w => !w.paid && !w.isOverdue).length;
    const overdue = weeks.filter(w => !w.paid && w.isOverdue).length;
    document.getElementById('summary').innerHTML =
      mkMetric('Recibidos', paid, 'green') +
      mkMetric('Pendientes', pending, 'neutral') +
      mkMetric('Atrasados', overdue, 'amber');
  }
  function mkMetric(label, value, cls) {
    return '<div class="metric"><div class="metric-label">' + label +
      '</div><div class="metric-value ' + cls + '">' + value + '</div></div>';
  }

  function renderWeeks() {
    document.getElementById('week-list').innerHTML = weeks.map(w => {
      const state     = w.paid ? 'paid' : (w.isOverdue ? 'overdue' : 'pending');
      const badgeText = w.paid ? 'Recibido' : (w.isOverdue ? 'Atrasado' : 'Pendiente');
      return '<div class="week-card ' + state + '">' +
        '<div class="check ' + (w.paid ? 'checked' : '') + '" onclick="toggle(' + w.id + ')">' +
          '<svg width="13" height="13" viewBox="0 0 13 13" fill="none">' +
            '<path d="M2.5 6.5L5.5 9.5L10.5 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' +
          '</svg>' +
        '</div>' +
        '<div class="week-info" onclick="toggle(' + w.id + ')">' +
          '<div class="week-label">' + w.label + '</div>' +
          '<div class="week-dates">' + w.dateRange + '</div>' +
        '</div>' +
        '<span class="badge ' + state + '">' + badgeText + '</span>' +
        '<button class="delete-btn" onclick="deleteWeek(' + w.id + ')" title="Eliminar semana">✕</button>' +
      '</div>';
    }).join('');
  }

  function renderHistory() {
    const el = document.getElementById('history-list');
    if (history.length === 0) {
      el.innerHTML = '<p class="empty-history">Aún no hay actividad registrada.</p>';
      return;
    }
    el.innerHTML = history.map(h => {
      const isPaid = h.type === 'paid';
      const statusText = isPaid ? 'Marcado como recibido' : 'Eliminado';
      return '<div class="history-item">' +
        '<div class="history-dot ' + (isPaid ? 'paid' : 'deleted') + '"></div>' +
        '<div class="history-label">' + h.label + '<br><span style="font-size:11px;color:#bbb">' + h.dateRange + '</span></div>' +
        '<div style="text-align:right">' +
          '<div class="history-status ' + (isPaid ? 'paid' : '') + '">' + statusText + '</div>' +
          '<div class="history-date-label">' + fmtDateTime(h.at) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function render() {
    renderSummary();
    renderWeeks();
    renderHistory();
  }

  render();
</script>
</body>
</html>
